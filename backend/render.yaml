services:
  - type: web
    name: intellibank-backend
    runtime: python3
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: SECRET_KEY
        generateValue: true
      - key: MONGO_URI
        sync: false
      - key: MONGO_DB
        value: banking_logs
      - key: FLASK_ENV
        value: production
      - key: CORS_ORIGINS
        sync: false
