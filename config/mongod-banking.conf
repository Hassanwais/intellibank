# MongoDB Configuration for Banking Application
systemLog:
  destination: file
  path: "C:\\Users\\taofa\\mongodb-data\\log\\banking-app-backup\\mongod.log"
  logAppend: true
  verbosity: 1

storage:
  dbPath: "C:\\Users\\taofa\\mongodb-data\\db"
  journal:
    enabled: true

net:
  bindIp: 127.0.0.1
  port: 27017

processManagement:
  windowsService:
    serviceName: MongoDB-Banking
    displayName: MongoDB Banking Service
    description: MongoDB for Intelligent Online Banking Platform